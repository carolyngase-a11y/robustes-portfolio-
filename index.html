<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Robustes Portfolio</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f7;
      margin: 0;
      padding: 40px;
      color: #1d1d1f;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .container {
      max-width: 1100px;
      margin: auto;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
      margin-top: 5px;
      margin-bottom: 10px;
    }

    .result {
      font-weight: bold;
    }

    .highlight {
      border: 2px dashed #ccc;
      text-align: center;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 20px;
    }

    .arrow {
      text-align: center;
      font-size: 20px;
      margin: 10px 0;
      color: #888;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: black;
      color: white;
      cursor: pointer;
    }

    @media print {
      button { display: none; }
      body { background: white; }
    }
  </style>
</head>

<body>
<div class="container">

  <h1>Robustes Portfolio</h1>

  <div class="card">
    <label>Kundename</label>
    <input id="name">

    <label>Datum</label>
    <input id="date" type="date">

    <label>Gesamtsumme (€)</label>
    <input id="total" type="number" oninput="calculate()">
  </div>

  <!-- Tagesgeld -->
  <div class="card">
    <h2>Tagesgeld</h2>
    <input placeholder="Betrag" id="tagesgeld" type="number" oninput="calculate()">
    <input placeholder="Sockelbetrag (optional)" id="tagesgeldSockel" type="number">
    <textarea placeholder="Notizen"></textarea>
  </div>

  <div class="arrow">⬇ Überlauf ⬇</div>

  <!-- Hauptportfolio -->
  <div class="card">
    <h2>Portfolio</h2>

    <div class="grid">
      <div>
        <h3>Krisenkasse</h3>
        <input placeholder="Betrag" id="krise" type="number" oninput="calculate()">
        <input placeholder="Sockelbetrag" id="kriseSockel" type="number">
        <textarea placeholder="Notizen"></textarea>
        <div class="result" id="krisePct"></div>
      </div>

      <div>
        <h3>Investitionsreserve</h3>
        <input placeholder="Betrag" id="reserve" type="number" oninput="calculate()">
        <textarea placeholder="Notizen"></textarea>
        <div class="result" id="reservePct"></div>
      </div>

      <div>
        <h3>Vermögensverwaltung</h3>
        <input placeholder="Betrag" id="vv" type="number" oninput="calculate()">
        <textarea placeholder="Notizen"></textarea>
        <div class="result" id="vvPct"></div>
      </div>

      <div>
        <h3>Märkte / Branchen</h3>
        <input placeholder="Betrag" id="markt" type="number" oninput="calculate()">
        <textarea placeholder="Notizen"></textarea>
        <div class="result" id="marktPct"></div>
      </div>

      <div>
        <h3>Spezialitäten</h3>
        <input placeholder="Betrag" id="spezial" type="number" oninput="calculate()">
        <textarea placeholder="Notizen"></textarea>
        <div class="result" id="spezialPct"></div>
      </div>
    </div>
  </div>

  <!-- Ergebnis -->
  <div class="card">
    <h2>Übersicht</h2>
    <div id="summary"></div>
  </div>

  <button onclick="window.print()">Drucken / PDF</button>

</div>

<script>
function calculate() {
  let total = parseFloat(document.getElementById("total").value) || 0;

  let fields = {
    krise: "krisePct",
    reserve: "reservePct",
    vv: "vvPct",
    markt: "marktPct",
    spezial: "spezialPct"
  };

  let sum = 0;

  for (let key in fields) {
    let val = parseFloat(document.getElementById(key).value) || 0;
    sum += val;

    let pct = total ? ((val / total) * 100).toFixed(1) : 0;
    document.getElementById(fields[key]).innerText = pct + " %";
  }

  let tagesgeld = parseFloat(document.getElementById("tagesgeld").value) || 0;
  sum += tagesgeld;

  let diff = total - sum;

  document.getElementById("summary").innerText =
    "Verteilt: " + sum + " € | Differenz: " + diff + " €";
}
</script>

</body>
</html>
